<style>
:root {
  --red: #c0392b;
  --border: #888;
  --header-bg: #f0f0f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #e8e8e8; color: #222; min-height: 100vh; }

/* HOME */
#home-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  min-height: 100vh; padding: 30px 20px 40px;
}
.home-logo {
  background: white; border-radius: 12px; padding: 20px 30px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 24px; text-align: center;
}
.home-logo img { max-width: 140px; height: auto; background: white; }
.home-title { font-size: 20px; font-weight: 800; color: var(--red); margin-top: 10px; letter-spacing: 1px; }
.home-subtitle { font-size: 12px; color: #888; margin-top: 4px; }
.btn-primary {
  background: var(--red); color: white; border: none; border-radius: 8px;
  padding: 15px 36px; font-size: 16px; font-weight: 700; cursor: pointer;
  width: 100%; max-width: 340px; margin: 6px 0; transition: all 0.2s;
}
.btn-primary:hover { background: #a93226; }
.btn-secondary {
  background: white; color: var(--red); border: 2px solid var(--red); border-radius: 8px;
  padding: 12px 30px; font-size: 14px; font-weight: 600; cursor: pointer;
  width: 100%; max-width: 340px; margin: 6px 0;
}
.saved-list { width: 100%; max-width: 500px; margin-top: 16px; }
.saved-item {
  background: white; border-radius: 8px; padding: 11px 14px;
  display: flex; align-items: center; justify-content: space-between;
  margin: 6px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.saved-item-info { flex: 1; cursor: pointer; }
.saved-item-title { font-weight: 700; font-size: 14px; }
.saved-item-sub { font-size: 12px; color: #888; margin-top: 2px; }
.saved-item-actions { display: flex; gap: 4px; }

/* BUTTONS */
.btn-sm { background:var(--red); color:white; border:none; border-radius:6px; padding:7px 14px; font-size:12px; cursor:pointer; margin:2px; }
.btn-sm.outline { background:white; color:var(--red); border:1px solid var(--red); }
.btn-sm.danger { background:#c0392b; }
.btn-sm.success { background:#27ae60; }

/* MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.55); z-index:1000; align-items:center; justify-content:center; padding:16px;
}
.modal-overlay.active { display:flex; }
.modal {
  background:white; border-radius:12px; padding:22px; width:100%; max-width:420px;
  box-shadow:0 8px 40px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto;
}
.modal h3 { color:var(--red); font-size:17px; margin-bottom:14px; }
.modal label { font-size:12px; font-weight:600; display:block; margin:10px 0 3px; color:#555; }
.modal input,.modal select,.modal textarea {
  width:100%; padding:9px 11px; border:1.5px solid #ddd; border-radius:6px;
  font-size:13px; outline:none; font-family:Arial,sans-serif;
}
.modal input:focus,.modal select:focus { border-color:var(--red); }
.modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; flex-wrap:wrap; }

/* TOP BAR */
.top-bar {
  background:white; padding:9px 14px;
  display:flex; align-items:center; gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12); position:sticky; top:0; z-index:200; flex-wrap:wrap;
}
.top-bar-title { flex:1; font-weight:700; font-size:13px; color:#333; min-width:80px; }
.top-bar-actions { display:flex; gap:5px; flex-wrap:wrap; }

/* FORM */
#form-screen { display:none; max-width:900px; margin:0 auto; padding-bottom:80px; }

/* DOC HEADER */
.doc-header { background:white; border:1.5px solid var(--border); }
.doc-header-inner {
  display:grid; grid-template-columns:90px 1fr 160px;
  align-items:stretch; border-bottom:1.5px solid var(--border);
}
.doc-header-logo {
  border-right:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center; padding:5px; background:white;
}
.doc-header-logo img { max-width:78px; max-height:58px; object-fit:contain; background:white; }
.doc-header-center {
  display:flex; align-items:center; justify-content:center; padding:8px;
  border-right:1.5px solid var(--border);
}
.doc-header-center h2 { font-size:15px; font-weight:800; text-align:center; letter-spacing:0.5px; text-transform:uppercase; }
.doc-header-right { display:flex; flex-direction:column; }
.header-right-top {
  font-size:11px; font-weight:700; padding:4px 8px; font-style:italic;
  border-bottom:1px solid var(--border); color:var(--red); font-family:'Times New Roman',serif;
}
.header-right-ord {
  font-size:12px; padding:5px 8px; font-weight:600;
  display:flex; align-items:center; gap:5px; flex:1;
}
.header-right-ord input {
  border:none; border-bottom:1px solid #aaa; outline:none;
  font-size:12px; flex:1; padding:0 2px; background:transparent;
}
.doc-header-bottom { display:grid; grid-template-columns:1fr 1fr; }
.header-row {
  display:flex; align-items:center;
  border-right:1px solid var(--border); border-top:1px solid var(--border);
}
.header-row:nth-child(even) { border-right:none; }
.header-label { font-size:12px; font-weight:700; padding:5px 10px; white-space:nowrap; min-width:68px; }
.header-value {
  font-size:12px; padding:5px 8px; flex:1;
  display:flex; align-items:center; gap:5px; flex-wrap:wrap;
}
.header-value input {
  border:none; border-bottom:1px solid #aaa; outline:none;
  font-size:12px; flex:1; min-width:60px; padding:0 2px;
  background:transparent; font-weight:700;
}
.header-value span { font-size:11px; color:#555; font-weight:700; white-space:nowrap; }

/* SECTIONS */
.section-header {
  background:#e0e0e0; font-weight:800; font-size:13px; padding:5px 10px;
  border-top:1.5px solid var(--border); border-bottom:1px solid var(--border);
  text-transform:uppercase; letter-spacing:0.5px;
  display:flex; align-items:center; justify-content:space-between;
}
.dati-table { border-top:1px solid var(--border); }
.dati-row { display:flex; border-bottom:1px solid #ddd; }
.dati-label {
  background:var(--header-bg); font-weight:700; font-size:12px;
  padding:5px 10px; width:130px; border-right:1px solid #ddd;
  display:flex; align-items:center;
}
.dati-input { flex:1; border:none; padding:5px 8px; font-size:12px; font-weight:700; outline:none; background:transparent; }

/* OPS */
.ops-table { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--border); }
.ops-item {
  display:flex; align-items:center; padding:5px 10px;
  border-bottom:1px solid #e0e0e0; border-right:1px solid #e0e0e0;
  font-size:12px; gap:8px; cursor:pointer; transition:background 0.15s;
}
.ops-item:nth-child(even) { border-right:none; }
.ops-item:hover { background:#fafafa; }
.ops-item input[type=checkbox] { width:16px; height:16px; accent-color:var(--red); flex-shrink:0; }
.ops-item-text { flex:1; line-height:1.3; }
.ops-item-edit { background:none; border:none; cursor:pointer; color:#bbb; font-size:11px; padding:0 2px; }
.ops-item-edit:hover { color:var(--red); }
.ops-add-row {
  grid-column:1/-1; padding:6px 10px; border-top:1px solid #ddd;
  display:flex; gap:6px; align-items:center;
}
.ops-add-row input { flex:1; border:1px solid #ddd; border-radius:4px; padding:5px 8px; font-size:12px; outline:none; }
.ops-add-row input:focus { border-color:var(--red); }

/* TENUTE */
.tenute-table { border-top:1px solid var(--border); width:100%; border-collapse:collapse; }
.tenute-table th {
  background:var(--header-bg); font-size:12px; font-weight:700;
  padding:5px 8px; border:1px solid #ddd; text-align:left;
}
.tenute-table td { border:1px solid #ddd; padding:2px; }
.tenute-table td input { width:100%; border:none; padding:4px 6px; font-size:12px; outline:none; background:transparent; }
.tenute-table td input:focus { background:#fffde7; }

/* NOTE */
.note-area { border-top:1px solid var(--border); padding:8px; background:white; }
.note-area textarea {
  width:100%; min-height:90px; border:1px solid #ddd; border-radius:4px;
  padding:8px; font-size:13px; resize:vertical; font-family:Arial,sans-serif; outline:none;
}
.note-area textarea:focus { border-color:var(--red); }

/* PHOTOS — 2x2 grid */
.photo-section { border-top:1px solid var(--border); padding:10px; background:white; }
.photo-controls { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; align-items:center; }
.photo-table { width:100%; border-collapse:collapse; }
.photo-table td { border:none; padding:6px; vertical-align:bottom; text-align:center; width:50%; }
.photo-cell-wrap { display:inline-block; position:relative; max-width:100%; }
.photo-cell-wrap img { max-width:100%; display:block; border:1px solid #ccc; border-radius:4px; }
.photo-cell-del {
  position:absolute; top:3px; right:3px;
  background:rgba(192,57,43,0.85); color:white; border:none;
  border-radius:50%; width:22px; height:22px; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-weight:700;
}
.photo-label { font-size:11px; color:#777; margin-top:4px; }
.photo-label input {
  border:none; border-bottom:1px solid #ddd; width:100%; max-width:160px;
  text-align:center; font-size:11px; outline:none; background:transparent;
}
.photo-resize { display:flex; align-items:center; gap:6px; font-size:12px; }
.photo-resize input[type=range] { width:120px; accent-color:var(--red); }

/* FOOTER — fixed look in app, absolute on page in export */
.page-footer {
  background:white;
  padding:0 0 8px 0;
  margin-top:0;
}
.page-footer-divline {
  position:relative;
  height:2px; background:#888;
  margin:0 0 6px 0;
  display:flex; align-items:center; justify-content:center;
}
.page-footer-ved {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:44px; height:44px; background:white;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.page-footer-ved img { width:40px; height:40px; border-radius:50%; }
.page-footer-row {
  display:flex; justify-content:space-between;
  padding:4px 20px 0; font-size:12px; color:#333;
}
.page-footer-field {
  display:flex; align-items:center; gap:6px;
}
.page-footer-field input {
  border:none; border-bottom:1px solid #aaa; outline:none;
  font-size:12px; min-width:90px; background:transparent; padding:0 2px;
}

/* CLIENT CARD */
.client-card {
  background:#f8f8f8; border-radius:8px; padding:11px 14px;
  margin:5px 0; display:flex; align-items:center; justify-content:space-between;
  border:1px solid #eee;
}
.client-card-name { font-weight:700; font-size:14px; }
.client-card-type { font-size:11px; color:#888; margin-top:2px; }

/* SHARE */
.share-menu {
  background:white; border-radius:12px; padding:20px; width:90%; max-width:360px;
}
.share-menu h3 { color:var(--red); margin-bottom:12px; font-size:16px; }
.share-btn {
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border:1.5px solid #eee; border-radius:8px; margin:5px 0; cursor:pointer;
  background:white; transition:all 0.2s; color:#333;
  font-size:13px; font-weight:600; width:100%;
}
.share-btn:hover { border-color:var(--red); background:#fff5f5; }
.share-icon { font-size:18px; width:26px; text-align:center; }

/* PRINT / PDF: fixed header+footer */
@media print {
  body { background:white; }
  .top-bar, .photo-controls, .ops-add-row, .ops-item-edit,
  .section-header .btn-sm { display:none !important; }
  #form-screen { padding-bottom:0; max-width:100%; margin:0; }
  .page-footer { 
    position:fixed; bottom:0; left:0; right:0; 
    background:white; z-index:999;
    padding-bottom:6mm;
  }
  .doc-header { 
    position:fixed; top:0; left:0; right:0;
    background:white; z-index:998;
  }
  #scheda-content { 
    margin-top:90px;
    margin-bottom:80px;
  }
  @page { margin:10mm 12mm 10mm 12mm; size:A4; }
}

/* ===== CLOUD SYNC ===== */
.cloud-bar {
  width:100%; max-width:500px; margin:8px 0 0 0;
  background:white; border-radius:10px; padding:10px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  display:flex; flex-direction:column; gap:6px;
}
.cloud-bar-mini {
  display:flex; align-items:center; gap:6px;
  width:100%; max-width:500px; margin:8px 0 0 0;
  background:white; border-radius:20px; padding:7px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.cloud-bar-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.cloud-bar input {
  flex:1; min-width:0; border:1.5px solid #ddd; border-radius:6px;
  padding:7px 10px; font-size:12px; outline:none; font-family:Arial,sans-serif;
}
.cloud-bar input:focus { border-color:var(--red); }
.cloud-bar label { font-size:11px; font-weight:700; color:#888; white-space:nowrap; }
.cloud-status {
  font-size:11px; padding:4px 10px; border-radius:20px;
  font-weight:700; display:flex; align-items:center; gap:5px;
  white-space:nowrap;
}
.cloud-status.ok    { background:#e8f8ed; color:#27ae60; }
.cloud-dot {
  display:inline-block; width:10px; height:10px; border-radius:50%;
  margin-right:5px; flex-shrink:0;
  box-shadow:0 0 0 0 rgba(39,174,96,0.4);
  animation:none;
}
.cloud-dot.green { background:#27ae60; animation:pulse-green 2s infinite; }
.cloud-dot.red   { background:#c0392b; }
.cloud-dot.yellow{ background:#e67e22; }
.cloud-dot.blue  { background:#2980b9; animation:pulse-blue 1s infinite; }
@keyframes pulse-green {
  0%   { box-shadow:0 0 0 0 rgba(39,174,96,0.5); }
  70%  { box-shadow:0 0 0 7px rgba(39,174,96,0); }
  100% { box-shadow:0 0 0 0 rgba(39,174,96,0); }
}
@keyframes pulse-blue {
  0%   { box-shadow:0 0 0 0 rgba(41,128,185,0.5); }
  70%  { box-shadow:0 0 0 5px rgba(41,128,185,0); }
  100% { box-shadow:0 0 0 0 rgba(41,128,185,0); }
}
.cloud-status.warn  { background:#fef9e7; color:#e67e22; }
.cloud-status.error { background:#fdecea; color:#c0392b; }
.cloud-status.sync  { background:#eaf3fb; color:#2980b9; }
.cloud-off { opacity:0.45; pointer-events:none; }
.sync-badge {
  position:absolute; top:-6px; right:-6px;
  background:#27ae60; color:white; border-radius:50%;
  width:18px; height:18px; font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
}
.saved-item-cloud { font-size:10px; color:#2980b9; font-weight:700; margin-top:1px; }
.cloud-section-title {
  font-size:11px; font-weight:800; color:#888; letter-spacing:0.5px;
  text-transform:uppercase; margin:14px 0 4px; width:100%; max-width:500px;
  text-align:left; padding:0 2px;
}

</style>
</head>
<body>

<!-- HOME -->

let clients = [
  {id:'c1',name:'A2A',type:'A2A',customOps:null,customTenute:null},
  {id:'c2',name:'Enel Termico',type:'ENEL_T',customOps:null,customTenute:null},

];

let photoSize = 300;
let _editIdx = -1;

// --- IndexedDB init (con fallback localStorage per Safari iOS) ---
let _useLocalFallback = false;
function initDB(){
  return new Promise((resolve,reject)=>{
    if(_db){resolve(_db);return;}
    if(_useLocalFallback){reject(new Error('fallback'));return;}
    try{
      const req = indexedDB.open('tmsSchedeDB',2);
      req.onupgradeneeded = e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('schede')) db.createObjectStore('schede',{keyPath:'id'});
        if(!db.objectStoreNames.contains('config')) db.createObjectStore('config',{keyPath:'key'});
      };
      req.onsuccess=e=>{_db=e.target.result;resolve(_db);};
      req.onerror=e=>{
        console.warn('IndexedDB error, using localStorage fallback',e);
        _useLocalFallback=true; reject(e);
      };
      req.onblocked=e=>{
        _useLocalFallback=true; reject(e);
      };
    }catch(e){
      _useLocalFallback=true; reject(e);
    }
  });
}
function dbGetAll(store){
  return initDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e);
  }));
}
function dbPut(store,obj){
  return initDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).put(obj);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e);
  }));
}
function dbDelete(store,key){
  return initDB().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e);
  }));
}
async function loadFromDB(){
  try{
    const schedeRaw = await dbGetAll('schede');
    savedSchedeList = schedeRaw||[];
    const cfgRaw = await dbGetAll('config');
    const clientsCfg = cfgRaw.find(x=>x.key==='clients');
    if(clientsCfg && clientsCfg.value && clientsCfg.value.length) clients=clientsCfg.value;
  }catch(e){
    console.warn('IndexedDB non disponibile, uso localStorage',e);
    _useLocalFallback=true;
    // Fallback: load from localStorage
    try{
      const ls=localStorage.getItem('tms_schede_v2');
      if(ls) savedSchedeList=JSON.parse(ls);
      const lc=localStorage.getItem('tms_clients_v2');
      if(lc){const parsed=JSON.parse(lc);if(parsed&&parsed.length)clients=parsed;}
    }catch(e2){console.warn('localStorage fallback error',e2);}
  }
}
function saveClientsToStorage(){
  try{ localStorage.setItem('tms_clients_v2', JSON.stringify(clients)); }catch(e){}
  if(!_useLocalFallback){
    dbPut('config',{key:'clients',value:clients}).catch(e=>console.warn(e));
  }
  // Sync template al cloud per condividerli con tutti
  fbPut('/templates', clients).catch(e=>console.warn('Template cloud sync error:', e));
}

async function loadTemplatesFromCloud(){
  try{
    const remote = await fbGet('/templates');
    if(remote && Array.isArray(remote) && remote.length){
      remote.forEach(rt=>{
        if(!rt || !rt.id) return;
        const local = clients.find(c=>c.id===rt.id);
        if(!local){
          clients.push(rt);
        } else {
          if(rt.customOps) local.customOps = rt.customOps;
          if(rt.customTenute) local.customTenute = rt.customTenute;
        }
      });
      try{ localStorage.setItem('tms_clients_v2', JSON.stringify(clients)); }catch(e){}
      if(!_useLocalFallback){
        dbPut('config',{key:'clients',value:clients}).catch(e=>console.warn(e));
      }
    }
  }catch(e){ console.warn('Template cloud load error:', e); }
}
function saveSchedeToStorage(){
  // Individual schede are saved via saveScheda() directly
}
async function saveSchedaToDB(s){
  // Cerca per ID — se non trovato aggiunge, se trovato aggiorna SOLO quella
  const idx = savedSchedeList.findIndex(x => x.id === s.id);
  if(idx >= 0) {
    savedSchedeList[idx] = JSON.parse(JSON.stringify(s)); // deep copy
  } else {
    savedSchedeList.push(JSON.parse(JSON.stringify(s)));
  }
  if(_useLocalFallback){
    try{ localStorage.setItem('tms_schede_v2', JSON.stringify(savedSchedeList)); }
    catch(e){ console.warn('localStorage save error',e); }
    return;
  }
  try{ await dbPut('schede', JSON.parse(JSON.stringify(s))); }
  catch(e){
    _useLocalFallback=true;
    try{ localStorage.setItem('tms_schede_v2', JSON.stringify(savedSchedeList)); }catch(e2){}
  }
}
async function deleteSchedaFromDB(id){
  savedSchedeList=savedSchedeList.filter(s=>s.id!==id);
  if(_useLocalFallback){
    try{ localStorage.setItem('tms_schede_v2', JSON.stringify(savedSchedeList)); }catch(e){}
    return;
  }
  try{ await dbDelete('schede',id); }
  catch(e){
    _useLocalFallback=true;
    try{ localStorage.setItem('tms_schede_v2', JSON.stringify(savedSchedeList)); }catch(e2){}
  }
}

function newSchedaData(clientId, clientName, type) {
  // Cerca il client per usare template personalizzati se disponibili

  // Operazioni: custom dal template oppure default per tipo
  const opsSource = (client && client.customOps)
    ? client.customOps
    : (type === 'ENEL_P' ? getOpsEnelP() : getOpsA2A());

  // Tenute: custom dal template oppure default per tipo
  const tenuteSource = (client && client.customTenute)
    ? client.customTenute
    : getDefaultTenute(type);

  const hasN = type === 'ENEL_P';
  const tenute = hasN
    ? tenuteSource.map(nome => ({nome, n:'', materiale:'', dimensioni:''}))
    : tenuteSource.map(nome => ({nome, materiale:'', dimensioni:''}));

  // ID univoco: timestamp + random suffix per evitare collisioni
  const uid = 'scheda_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);

  return {
    id: uid, clientId, clientName, type,
    createdAt:new Date().toISOString(),
    ord:'', commessa:'', impianto:'', tag:'',
    valvola:'', dn:'', classe:'', tipologia:'',
    footerData:'', footerTimbro:'',
    ops: opsSource.map(o=>({text:o,checked:false})),
    tenute,
    hasN,
    tenuteLabel: hasN ? 'Guarnizioni Sostituite' : 'TENUTE',
    note:'', photos:[],
    completed: false, completedAt: null, completedBy: null
  };
}

// ── Normalizza campi che Firebase potrebbe aver rimosso (array vuoti → undefined) ──
function normalizeScheda(s) {
  if(!s) return s;
  if(!Array.isArray(s.photos)) s.photos = [];
  if(!Array.isArray(s.ops))    s.ops = [];
  if(!Array.isArray(s.tenute)) s.tenute = [];
  if(typeof s.note !== 'string') s.note = s.note || '';
  if(typeof s.ord !== 'string') s.ord = s.ord || '';
  if(typeof s.commessa !== 'string') s.commessa = s.commessa || '';
  if(typeof s.impianto !== 'string') s.impianto = s.impianto || '';
  if(typeof s.tag !== 'string') s.tag = s.tag || '';
  if(typeof s.valvola !== 'string') s.valvola = s.valvola || '';
  if(typeof s.dn !== 'string') s.dn = s.dn || '';
  if(typeof s.classe !== 'string') s.classe = s.classe || '';
  if(typeof s.tipologia !== 'string') s.tipologia = s.tipologia || '';
  if(typeof s.completed !== 'boolean') s.completed = false;
  if(!s.completedAt) s.completedAt = null;
  if(!s.completedBy) s.completedBy = null;
  return s;
}

function openScheda(id) {
  const found = savedSchedeList.find(s => s.id === id);
  if(found) {
    currentScheda = normalizeScheda(JSON.parse(JSON.stringify(found)));
    currentScheda._openedAt = new Date().toISOString();
    showFormScreen();
  }
}

// Solo gli utenti autorizzati possono eliminare schede (locale e cloud)
const DELETE_PIN = '2025';

function verifyDeletePin() {
  const pin = prompt('🔒 Inserisci il PIN di autorizzazione:');
  if(pin === null) return false;
  if(pin === DELETE_PIN) return true;
  showToast('❌ PIN errato — operazione non autorizzata', '#c0392b');
  return false;
}

async function deleteScheda(id) {
  if(!verifyDeletePin()) return;
  if(!confirm('Eliminare questa scheda?'))return;
  try{ await deleteSchedaFromDB(id); }catch(e){console.error(e);}
  savedSchedeList=savedSchedeList.filter(s=>s.id!==id);
  renderHome();
}

let _tplClientId = null;
let _tplOps = [];
let _tplTenute = [];

function getDefaultOps(type) {
  return type === 'ENEL_P' ? getOpsEnelP() : getOpsA2A();
}
function getDefaultTenute(type) {
  return type === 'ENEL_P'
    ? ['Guarnizione accoppiamento corpo valvola','O-ring accoppiamento corpo valvola',
       'Guarnizione accoppiamento perno','O-ring accoppiamento perno','O-ring sede di tenuta',
       'Guarnizione fondello','O-ring fondello','Pacco baderna perno','O-ring frizione perno','O-ring lente']
    : ['Guarnizione fondello','Guarnizione autoclave','Baderna valvola'];
}

function openTemplateEditor(clientId) {
  const c = clients.find(x => x.id === clientId);
  if(!c) return;
  _tplClientId = clientId;
  // Carica ops/tenute custom oppure default
  _tplOps = c.customOps ? [...c.customOps] : [...getDefaultOps(c.type)];
  _tplTenute = c.customTenute ? [...c.customTenute] : [...getDefaultTenute(c.type)];

  renderTplOps();

function renderTplTenute() {

  _tplTenute.splice(i, 1);

  const c = clients.find(x => x.id === _tplClientId);
  if(!c) return;
  if(!confirm('Ripristinare operazioni e tenute ai valori default per ' + c.name + '?')) return;

function buildPhotosGrid(photos){

  let rows='';
  for(let i=0;i<photos.length;i+=2){
    const p1=photos[i], p2=photos[i+1]||null;
    function pCell(p,idx){
      if(!p) return '<td style="width:50%;"></td>';
      return `<td style="width:50%;padding:6px;text-align:center;vertical-align:bottom;">
        <div class="photo-cell-wrap">
          <button class="photo-cell-del" onclick="removePhoto(${idx})">×</button>
          <img src="${p.dataUrl}" style="max-height:${photoSize}px;max-width:100%;" alt="">
        </div>
        <div class="photo-label"><input value="${p.label||'Figura '+(idx+1)}" onchange="currentScheda.photos[${idx}].label=this.value"></div>
      </td>`;
    }
    rows+=`<tr>${pCell(p1,i)}${pCell(p2,i+1)}</tr>`;
  }
  return `<table class="photo-table"><tbody>${rows}</tbody></table>`;
}

  currentScheda.ops.push({text,checked:false}); inp.value='';

// PHOTOS
function triggerCamera() {
  // Su HTTPS (GitHub Pages) proviamo prima getUserMedia per aprire vera fotocamera
  // Se non disponibile o negato, cade su input[capture] che su mobile apre la camera
  // Su desktop apre comunque il file picker
  const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
  const hasCam = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

  if(isHttps && hasCam) {
    // Prova getUserMedia — se l'utente accetta, scatta foto tramite canvas
    navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}, audio: false})
      .then(stream => {
        // Crea overlay fotocamera minimale
        _openCameraOverlay(stream);
      })
      .catch(() => {
        // Permesso negato o errore: usa input file con capture
        document.getElementById('cam-inp').click();
      });
  } else {
    document.getElementById('cam-inp').click();
  }
}

function _openCameraOverlay(stream) {
  // Crea overlay a schermo intero con anteprima video
  const ov = document.createElement('div');
  ov.id = 'cam-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;';

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.style.cssText = 'max-width:100%;max-height:75vh;object-fit:contain;';
  video.srcObject = stream;

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'margin-top:16px;display:flex;gap:16px;';

  const snapBtn = document.createElement('button');
  snapBtn.textContent = '📸 Scatta';
  snapBtn.className = 'btn-primary';
  snapBtn.style.cssText = 'padding:14px 32px;font-size:16px;';

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Annulla';
  closeBtn.className = 'btn-secondary';
  closeBtn.style.cssText = 'padding:14px 24px;font-size:16px;';

  function cleanup() {
    stream.getTracks().forEach(t => t.stop());
    ov.remove();
  }

  snapBtn.onclick = async () => {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const rawUrl = canvas.toDataURL('image/jpeg', 0.85);
    cleanup();
    showToast('⏳ Ottimizzazione foto...','#2980b9');
    const dataUrl = await compressPhoto(rawUrl);
    currentScheda.photos.push({dataUrl, label: 'Figura ' + (currentScheda.photos.length + 1)});
    rerenderPhotos();
    showToast('✅ Foto aggiunta','#27ae60');
  };

  closeBtn.onclick = cleanup;

  btnRow.appendChild(snapBtn);
  btnRow.appendChild(closeBtn);
  ov.appendChild(video);
  ov.appendChild(btnRow);
  document.body.appendChild(ov);
}

// ── Comprimi foto al momento dell'inserimento (max 1200px lato lungo, JPEG 80%) ──
// Riduce drasticamente il peso per Firebase senza perdere qualità per il report
async function compressPhoto(dataUrl, maxW=1600, maxH=1600, quality=0.92){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight;
      // Se già piccola, non ridimensionare ma ri-comprimi in JPEG
      const scale=Math.min(1, maxW/w, maxH/h);
      const tw=Math.round(w*scale), th=Math.round(h*scale);
      const cv=document.createElement('canvas');
      cv.width=tw; cv.height=th;
      cv.getContext('2d').drawImage(img,0,0,tw,th);
      resolve(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

function addPhotos(input){
  const files=Array.from(input.files);
  if(!files.length) return;
  let loaded=0;
  showToast('⏳ Ottimizzazione foto...','#2980b9');
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=async e=>{
      const compressed = await compressPhoto(e.target.result);
      currentScheda.photos.push({dataUrl:compressed,label:'Figura '+(currentScheda.photos.length+1)});
      loaded++;
      if(loaded===files.length){
        rerenderPhotos();
        showToast('✅ '+files.length+' foto aggiunt'+(files.length===1?'a':'e'),'#27ae60');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function removePhoto(i){currentScheda.photos.splice(i,1);rerenderPhotos();}
function rerenderPhotos(){
  const g=document.getElementById('photo-grid');
  if(g) g.innerHTML=buildPhotosGrid(currentScheda.photos);
}

function toggleCompleted(){
  if(!currentScheda) return;
  if(!verifyDeletePin()) return;
  if(currentScheda.completed){
    // Riapri scheda
    if(!confirm('Vuoi riaprire questa scheda e togliere lo stato "Completa"?')) return;
    currentScheda.completed = false;
    currentScheda.completedAt = null;
    currentScheda.completedBy = null;
    showToast('🔓 Scheda riaperta','#e67e22');
  } else {
    // Segna completa
    if(!confirm('Segnare questa scheda come COMPLETA?\nPotrà essere archiviata e scaricata.')) return;
    let userName = localStorage.getItem('tms_username') || '';
    if(!userName){
      userName = prompt('Il tuo nome:', '') || 'Operatore';
      localStorage.setItem('tms_username', userName);
    }
    currentScheda.completed = true;
    currentScheda.completedAt = new Date().toISOString();
    currentScheda.completedBy = userName;
    showToast('✅ Scheda segnata come COMPLETA!','#27ae60');
  }
  updateCompletedUI();
  // Salva automaticamente sul cloud (non in locale)
  saveToCloud();
}

function updateCompletedUI(){
  const badge = document.getElementById('status-badge');
  const btn = document.getElementById('btn-completa');
  if(!currentScheda || !badge || !btn) return;
  if(currentScheda.completed){

// ── DUPLICA SCHEDA e pubblica sul cloud ─────────────────────────────
async function duplicateScheda(){
  if(!currentScheda) return;
  collectNote();
  if(!confirm('Duplicare questa scheda e pubblicarla sul cloud?')) return;

  // Deep copy con nuovo ID
  const copy = normalizeScheda(JSON.parse(JSON.stringify(currentScheda)));
  copy.id = 'scheda_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
  copy.createdAt = new Date().toISOString();
  copy.completed = false;
  copy.completedAt = null;
  copy.completedBy = null;
  delete copy._openedAt;

  let userName = localStorage.getItem('tms_username') || '';
  if(!userName){
    userName = prompt('Il tuo nome:', '') || 'Operatore';
    localStorage.setItem('tms_username', userName);
  }

  const now = new Date().toISOString();
  copy._savedBy = userName;
  copy.updatedAt = now;

  // Salva sul cloud
  const meta = {
    id: copy.id, clientName: copy.clientName||'', type: copy.type||'A2A',
    ord: copy.ord||'', commessa: copy.commessa||'', impianto: copy.impianto||'', tag: copy.tag||'',
    valvola: copy.valvola||'', dn: copy.dn||'', classe: copy.classe||'', tipologia: copy.tipologia||'',
    tenuteLabel: copy.tenuteLabel||'TENUTE', hasN: copy.hasN||false,
    completed: false, completedAt: null, completedBy: null,
    createdAt: now, updatedAt: now, _savedBy: userName
  };
  const full = {...copy};
  delete full._thumbs;

  _mySaveIds.add(copy.id);
  showToast('⏳ Duplicazione e pubblicazione...','#8e44ad');
  try {
    await Promise.all([
      fbPut('/meta/' + copy.id, meta),
      fbPut('/full/' + copy.id, full)
    ]);
    // Apri la copia nell'editor
    currentScheda = copy;
    currentScheda._openedAt = now;
    updateCompletedUI();
    showToast('✅ Scheda duplicata e pubblicata sul cloud!','#27ae60');
    await syncFromCloud();
    setTimeout(()=>{ _mySaveIds.delete(copy.id); }, 5000);
  } catch(e) {
    _mySaveIds.delete(copy.id);
    showToast('❌ Errore: ' + e.message, '#c0392b');
  }
}

// ── NOTIFICHE IN-APP per aggiornamenti cloud da altri utenti ────────
let _notifQueue = [];
let _notifShowing = false;

function showNotification(msg, color='#2980b9') {
  _notifQueue.push({msg, color});
  if(!_notifShowing) _processNotifQueue();
}

function _processNotifQueue() {
  if(!_notifQueue.length) { _notifShowing = false; return; }
  _notifShowing = true;
  const {msg, color} = _notifQueue.shift();

  // Suono sottile di notifica
  _playNotifSound();

  // Banner in alto
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `
    position:fixed; top:-60px; left:50%; transform:translateX(-50%);
    background:${color}; color:white; padding:12px 24px; border-radius:0 0 10px 10px;
    font-weight:700; z-index:10000; font-size:13px; max-width:90vw; text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.3); transition:top 0.4s ease;
    cursor:pointer;
  `;
  el.onclick = () => { el.remove(); _processNotifQueue(); };
  document.body.appendChild(el);

  // Animazione entrata
  requestAnimationFrame(() => { el.style.top = '0px'; });

  // Auto-dismiss dopo 5 secondi
  setTimeout(() => {
    el.style.top = '-60px';
    setTimeout(() => { el.remove(); _processNotifQueue(); }, 400);
  }, 5000);
}

// ── Audio: AudioContext persistente, sbloccato al primo tocco utente ──
let _audioCtx = null;
let _audioUnlocked = false;

function _ensureAudioCtx() {
  if(!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(_audioCtx.state === 'suspended') {
    _audioCtx.resume().catch(()=>{});
  }
  return _audioCtx;
}

// Sblocca audio al primo tocco/click dell'utente (richiesto dai browser moderni)
function _unlockAudio() {
  if(_audioUnlocked) return;
  try {
    const ctx = _ensureAudioCtx();
    ctx.resume().then(()=>{
      // Suono silenzioso per sbloccare definitivamente
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.01);
      _audioUnlocked = true;
      // Rimuovi il banner
      const banner = document.getElementById('audio-unlock-banner');
      if(banner) {
        banner.style.opacity = '0';
        setTimeout(()=> banner.remove(), 400);
      }
    }).catch(()=>{});
  } catch(e) {}
}
document.addEventListener('click', _unlockAudio, {once: false});
document.addEventListener('touchstart', _unlockAudio, {once: false});

// Mostra banner "tocca per attivare audio" all'avvio
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{
    if(_audioUnlocked) return;
    const b = document.createElement('div');
    b.id = 'audio-unlock-banner';
    b.innerHTML = '🔊 <b>Tocca qui per attivare le notifiche sonore</b>';
    b.style.cssText = `
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#1a1a2e,#0f3460); color:white;
      padding:14px 28px; border-radius:12px; z-index:10002;
      font-size:14px; text-align:center; cursor:pointer;
      box-shadow:0 4px 20px rgba(0,0,0,0.4); transition:opacity 0.4s;
      animation: _audioPulse 2s infinite;
    `;
    // Animazione pulsante
    const style = document.createElement('style');
    style.textContent = '@keyframes _audioPulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.05);} }';
    document.head.appendChild(style);
    b.onclick = ()=> _unlockAudio();
    document.body.appendChild(b);
  }, 0);
});

function _playNotifSound() {
  try {
    const ctx = _ensureAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    // 4 beep al massimo volume — 2 secondi totale
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.45);
    osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.95);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 1.45);
    gain.gain.setValueAtTime(1.0, ctx.currentTime);
    gain.gain.setValueAtTime(0.001, ctx.currentTime + 0.35);
    gain.gain.setValueAtTime(1.0, ctx.currentTime + 0.45);
    gain.gain.setValueAtTime(0.001, ctx.currentTime + 0.8);
    gain.gain.setValueAtTime(1.0, ctx.currentTime + 0.95);
    gain.gain.setValueAtTime(0.001, ctx.currentTime + 1.3);
    gain.gain.setValueAtTime(1.0, ctx.currentTime + 1.45);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.0);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 2.0);
  } catch(e) { /* audio non supportato */ }
}

// =================== DOCX EXPORT ===================
async function resizeImgToCanvas(dataUrl, maxW=320, maxH=240){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth||320, h=img.naturalHeight||240;
      const scale=Math.min(1, maxW/w, maxH/h);
      const tw=Math.round(w*scale)||maxW, th=Math.round(h*scale)||maxH;
      const cv=document.createElement('canvas');
      cv.width=tw; cv.height=th;
      cv.getContext('2d').drawImage(img,0,0,tw,th);
      resolve(cv.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

async function buildAndDownloadDocx(){
  const s=currentScheda;
  showToast('⏳ Ottimizzazione foto...','#2980b9');
  // Pre-resize all photos to 320x240 max, maintaining aspect ratio
  const thumbs={};
  for(let i=0;i<(s.photos||[]).length;i++){
    try{ thumbs[i]=await resizeImgToCanvas(s.photos[i].dataUrl,320,240); }
    catch(e){ thumbs[i]=s.photos[i].dataUrl; }
  }
  // Attach thumbs to a temp copy (not saved)
  const sCopy=Object.assign({},s,{_thumbs:thumbs});
  showToast('⏳ Generazione DOC...','#2980b9');
  const wordHTML = buildWordHTML(sCopy);
  const blob = new Blob([wordHTML], {type:'application/vnd.ms-word;charset=utf-8'});
  const cName=(s.clientName||'scheda').replace(/\s+/g,'_');
  triggerDownload(blob, `Scheda_${cName}_${s.tag||s.valvola||'valvola'}.doc`);
  showToast('✅ DOC scaricato!','#27ae60');
  closeModal('share-modal');
}

function buildWordHTML(s){

    const l=opsL[i]||null,r=opsR[i]||null;
    opsRows+=`<tr>
      <td style="width:18px;text-align:center;border:1px solid #ddd;">${l&&l.checked?'☑':'☐'}</td>
      <td style="border:1px solid #ddd;padding:4px 8px;font-size:10pt;">${l?l.text:''}</td>
      <td style="width:18px;text-align:center;border:1px solid #ddd;">${r&&r.checked?'☑':'☐'}</td>
      <td style="border:1px solid #ddd;padding:4px 8px;font-size:10pt;">${r?r.text:''}</td>
    </tr>`;

  let tHdr,tRowFn;
  if(s.hasN){
    tHdr=`<th style="width:40%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">Descrizione</th>
           <th style="width:8%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">N°</th>
           <th style="width:26%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">Mat.</th>
           <th style="width:26%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">Dim.</th>`;
    tRowFn=t=>`<tr>
      <td style="border:1px solid #ddd;padding:4px 6px;">${t.nome||''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;text-align:center;">${t.n||''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;">${t.materiale||''}</td>
      <td style="border:1px solid #ddd;padding:4px 6px;">${t.dimensioni||''}</td></tr>`;
  }else{
    tHdr=`<th style="width:40%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">TENUTE</th>
           <th style="width:30%;background:#f0f0f0;border:1px solid #888;padding:5px 8px;">MATERIALE</th>

      <td style="border:1px solid #ddd;padding:4px 6px;">${t.dimensioni||''}</td></tr>`;
  }

  // Photos 2x2 table — proportional, fixed max size per cell
  // Strategy: use canvas to resize each image to fit within 240x180px, then embed resized dataUrl
  // This guarantees proportional images of identical display size in Word

  const photos=s.photos||[];
  if(photos.length){
    // Resize all photos first (async), then build table
    async function resizePhoto(dataUrl, maxW=320, maxH=240){
      return new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.naturalWidth, h=img.naturalHeight;
          if(!w||!h){resolve(dataUrl);return;}
          // calculate scale to fit within maxW x maxH
          const scale=Math.min(1, maxW/w, maxH/h);
          const tw=Math.round(w*scale), th=Math.round(h*scale);
          const cv=document.createElement('canvas');
          cv.width=tw; cv.height=th;
          const ctx=cv.getContext('2d');
          ctx.drawImage(img,0,0,tw,th);

// =================== DOWNLOAD HELPERS ===================
function triggerDownload(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function downloadFormat(fmt){
  collectNote();
  const s=currentScheda;
  const cName=(s.clientName||'scheda').replace(/\s+/g,'_');
  const fname=`Scheda_${cName}_${s.tag||s.valvola||'valvola'}`;
  if(fmt==='html'){
    const blob=new Blob([buildExportHTML()],{type:'text/html;charset=utf-8'});
    triggerDownload(blob,fname+'.html');
    closeModal('share-modal');
  }else if(fmt==='docx'){
    buildAndDownloadDocx();
  }else if(fmt==='json'){
    // Export full scheda as JSON (photos included as base64) — can be re-imported
    const exportObj={
      _tmsFormat: 'v1',
      _exportDate: new Date().toISOString(),
      scheda: s
    };
    const blob=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json;charset=utf-8'});
    triggerDownload(blob,fname+'.json');
    closeModal('share-modal');
    showToast('✅ JSON esportato — puoi reimportarlo in qualsiasi momento','#27ae60');
  }
}

// =================== IMPORT SCHEDA ===================
async function importScheda(input){
  const file=input.files[0];
  if(!file){return;}
  input.value='';
  const ext=file.name.split('.').pop().toLowerCase();

  try{
    if(ext==='json'||ext==='tms'){
      // Parse TMS JSON export
      const text=await file.text();
      let parsed;
      try{ parsed=JSON.parse(text); }
      catch(e){ showToast('❌ File JSON non valido','#c0392b'); return; }

      let schedata=null;
      if(parsed._tmsFormat==='v1' && parsed.scheda){
        schedata=parsed.scheda;
      } else if(parsed.id && parsed.clientName){
        // Direct scheda object
        schedata=parsed;
      } else {
        showToast('❌ Formato non riconosciuto','#c0392b'); return;
      }

      // Ask user: open directly or save as new copy?
      const action=confirm(
        `Scheda trovata:\n` +
        `Cliente: ${schedata.clientName||'?'}\n` +
        `Valvola: ${schedata.valvola||'?'} | TAG: ${schedata.tag||'?'}\n\n` +
        `OK = Apri e modifica (come copia)\n` +
        `Annulla = Solo visualizza senza salvare`
      );

      // Always create a new copy with new ID to avoid overwriting original
      const imported=JSON.parse(JSON.stringify(schedata));
      imported.id='scheda_'+Date.now();
      imported.importedFrom=schedata.id||'unknown';
      imported.importedAt=new Date().toISOString();
      // preserve all fields including photos, ops, tenute

      currentScheda=imported;

      if(action){
        // Save to DB immediately
        await saveSchedaToDB(imported);
        showToast('✅ Scheda importata e salvata','#27ae60');
      } else {
        showToast('📂 Scheda aperta — non salvata','#2980b9');
      }
      showFormScreen();

    } else if(ext==='html'){
      // Try to extract embedded JSON from TMS HTML export
      const text=await file.text();
      // Look for the embedded scheda data comment or meta tag
      const marker='<!-- TMS_SCHEDA_DATA:';
      const markerEnd='-->';
      const idx=text.indexOf(marker);
      if(idx>=0){
        const jsonStr=text.slice(idx+marker.length, text.indexOf(markerEnd,idx));
        try{
          const schedata=JSON.parse(jsonStr.trim());
          const imported=JSON.parse(JSON.stringify(schedata));
          imported.id='scheda_'+Date.now();
          imported.importedAt=new Date().toISOString();
          currentScheda=imported;
          const action=confirm(`Scheda HTML trovata:\nCliente: ${imported.clientName||'?'}\n\nOK = Importa e salva`);
          if(action){ await saveSchedaToDB(imported); showToast('✅ Importata da HTML','#27ae60'); }
          showFormScreen();
          return;
        }catch(e){}
      }
      showToast('⚠️ Nessun dato TMS trovato nell\'HTML\nUsa il formato JSON per l\'importazione','#e67e22');
    } else {
      showToast('❌ Formato non supportato\nUsa .json o .tms','#c0392b');
    }
  }catch(e){
    console.error('Import error',e);
    showToast('❌ Errore durante l\'importazione','#c0392b');
  }
}

function printScheda(){
  collectNote();
  const w=window.open('','_blank');
  w.document.write(buildExportHTML());
  w.document.close();
  setTimeout(()=>w.print(),900);
  closeModal('share-modal');
}

function shareVia(platform){
  collectNote();
  const s=currentScheda;
  const text=`Scheda Revisione Valvole\nCliente: ${s.clientName||''}\nValvola: ${s.valvola||''} | TAG: ${s.tag||''}\nORD: ${s.ord||''}`;
  const enc=encodeURIComponent(text);
  if(platform==='whatsapp') window.open(`https://wa.me/?text=${enc}`,'_blank');
  else if(platform==='telegram') window.open(`https://t.me/share/url?url=&text=${enc}`,'_blank');
  else if(platform==='email'){
    const sub=encodeURIComponent(`Scheda Revisione Valvole - ${s.clientName||''}`);
    window.open(`mailto:?subject=${sub}&body=${enc}`,'_blank');
  }
  closeModal('share-modal');
}

async function fbGet(path) {
  const resp = await fetch(FB_BASE + path + '.json', {method:'GET'});
  if(!resp.ok) throw new Error('Firebase GET error: ' + resp.status);
  return resp.json();
}

async function fbPut(path, data) {
  const resp = await fetch(FB_BASE + path + '.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if(!resp.ok) throw new Error('Firebase PUT error: ' + resp.status);
  return resp.json();
}

async function fbDelete(path) {
  const resp = await fetch(FB_BASE + path + '.json', {method:'DELETE'});
  if(!resp.ok) throw new Error('Firebase DELETE error: ' + resp.status);
  return resp.json();
}

// ── SYNC ────────────────────────────────────────────────────────────
async function syncFromCloud() {
  if(_cloudSyncing) return;
  _cloudSyncing = true;
  const btn = document.getElementById('btn-sync-cloud');
  if(btn) btn.textContent = '⏳';
  setDot('blue', 'Sincronizzo...');
  try {
    const data = await fbGet('/meta');
    // BUGFIX: se Firebase è vuoto, data è null — Array.isArray evita il crash su .length
    if(data && typeof data === 'object') {
      cloudSchedeList = Object.values(data)
        .filter(Boolean)
        .sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
    } else {
      cloudSchedeList = [];
    }
    renderCloudList();
    const n = cloudSchedeList.length;
    setDot('green', '☁️ Connesso — ' + n + (n===1?' scheda':' schede'));
    const syncEl = document.getElementById('cloud-last-sync');
    if(syncEl) syncEl.textContent = new Date().toLocaleTimeString('it');
  } catch(e) {
    console.error('Firebase sync error:', e);
    setDot('red', '❌ ' + e.message);
    showToast('❌ Cloud: ' + e.message, '#c0392b');
  } finally {
    _cloudSyncing = false;
    if(btn) btn.textContent = '🔄';
  }
}

// ── RENDER LISTA CLOUD ──────────────────────────────────────────────
function renderCloudList() {
  const list = document.getElementById('cloud-list');
  const titleEl = document.getElementById('cloud-list-title');
  if(!list) return;
  if(titleEl) titleEl.style.display = cloudSchedeList.length ? 'block' : 'none';
  if(!cloudSchedeList.length) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:10px;">Nessuna scheda nel cloud</div>';
    return;
  }
  list.innerHTML = cloudSchedeList.map(s => {
    const d = s.updatedAt ? new Date(s.updatedAt).toLocaleString('it') : '—';
    const isLocal = savedSchedeList.some(x => x.id === s.id);
    return `<div class="saved-item" style="border-left:3px solid #27ae60;">
      <div class="saved-item-info" onclick="openCloudScheda('${s.id}')">
        <div class="saved-item-title">${s.completed?'<span style="color:#27ae60;margin-right:4px;">✅</span>':''}${s.clientName||'?'} — ${s.valvola||'(valvola)'} ${s.tag?'| TAG '+s.tag:''}</div>
        <div class="saved-item-sub">ORD: ${s.ord||'—'} | ${d}${s.completed?' | <span style="color:#27ae60;font-weight:700;">COMPLETA</span>':''}</div>
        <div class="saved-item-cloud">☁️ Cloud${isLocal?' · 💾 Anche locale':''} · ${s._savedBy||'?'}</div>
      </div>
      <div class="saved-item-actions">
        <button class="btn-sm outline" onclick="openCloudScheda('${s.id}')">Apri</button>
        <button class="btn-sm danger" onclick="deleteCloudScheda('${s.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── APRI scheda dal cloud ───────────────────────────────────────────
async function openCloudScheda(id) {
  try {
    showToast('⏳ Caricamento...','#2980b9');
    const scheda = await fbGet('/full/' + id);
    if(scheda && scheda.id) {
      currentScheda = normalizeScheda(JSON.parse(JSON.stringify(scheda)));
      currentScheda._openedAt = new Date().toISOString();
      showFormScreen();
    } else {
      throw new Error('Scheda non trovata');
    }
  } catch(e) {
    showToast('❌ ' + e.message, '#c0392b');
  }
}

// ── ELIMINA scheda dal cloud ────────────────────────────────────────
async function deleteCloudScheda(id) {
  if(!verifyDeletePin()) return;
  if(!confirm('Eliminare questa scheda dal cloud?\nVisibile a tutti gli utenti.')) return;
  _mySaveIds.add(id);
  try {
    await Promise.all([
      fbDelete('/meta/' + id),
      fbDelete('/full/' + id)
    ]);
    cloudSchedeList = cloudSchedeList.filter(x => x.id !== id);
    renderCloudList();
    showToast('✅ Eliminata dal cloud','#27ae60');
  } catch(e) {
    showToast('❌ ' + e.message, '#c0392b');
  }
  setTimeout(()=>{ _mySaveIds.delete(id); }, 5000);
}

// ── SALVA scheda sul cloud ──────────────────────────────────────────
async function saveToCloud() {
  collectNote();
  const s = currentScheda;

  let userName = localStorage.getItem('tms_username') || '';
  if(!userName) {
    userName = prompt('Il tuo nome (visibile agli altri utenti):', '') || 'Utente';
    localStorage.setItem('tms_username', userName);
  }

  const now = new Date().toISOString();

  showToast('⏳ Salvataggio cloud...','#2980b9');
  _mySaveIds.add(s.id);
  try {
    // ── MERGE: leggi versione cloud prima di sovrascrivere ──
    let remote = null;
    try { remote = await fbGet('/full/' + s.id); } catch(e) { /* scheda nuova, nessun remote */ }

    let merged;
    if(remote && remote.id === s.id && remote.updatedAt && s._openedAt &&
       new Date(remote.updatedAt) > new Date(s._openedAt)) {
      // Il cloud è stato aggiornato DA UN ALTRO OPERATORE dopo che noi abbiamo aperto la scheda
      merged = mergeSchede(s, remote, userName);
      showToast('🔄 Merge con modifiche di ' + (remote._savedBy||'altro operatore'),'#2980b9');
    } else {
      merged = {...s};
    }

    merged._savedBy = userName;
    merged.updatedAt = now;

    // Costruisci meta (senza foto)
    const meta = {
      id: merged.id, clientName: merged.clientName||'', type: merged.type||'A2A',
      ord: merged.ord||'', commessa: merged.commessa||'', impianto: merged.impianto||'', tag: merged.tag||'',
      valvola: merged.valvola||'', dn: merged.dn||'', classe: merged.classe||'', tipologia: merged.tipologia||'',
      tenuteLabel: merged.tenuteLabel||'TENUTE', hasN: merged.hasN||false,
      completed: merged.completed||false, completedAt: merged.completedAt||null, completedBy: merged.completedBy||null,
      createdAt: merged.createdAt||now, updatedAt: now, _savedBy: userName
    };

    // Costruisci full (con foto)
    const full = {...merged};
    delete full._thumbs;
    delete full._openedAt;

    await Promise.all([
      fbPut('/meta/' + merged.id, meta),
      fbPut('/full/' + merged.id, full)
    ]);

    // Aggiorna currentScheda con il risultato del merge
    currentScheda = normalizeScheda(JSON.parse(JSON.stringify(merged)));
    currentScheda._openedAt = now;

    showToast('✅ Salvata sul cloud! Visibile a tutti.','#27ae60');
    await syncFromCloud();
    setTimeout(()=>{ _mySaveIds.delete(s.id); }, 5000);
  } catch(e) {
    _mySaveIds.delete(s.id);
    showToast('❌ Firebase: ' + e.message, '#c0392b');
  }
  closeModal('share-modal');
}

// ── MERGE INTELLIGENTE per lavoro simultaneo ────────────────────────
// Confronta la versione locale (mia) con quella remota (cloud).
// Per i campi semplici: se io ho modificato il campo (diverso dal valore di apertura), uso il mio;
// altrimenti prendo quello del cloud (che potrebbe essere stato aggiornato dall'altro operatore).
// Per gli array (ops, tenute, photos): merge additivo — unisce le modifiche di entrambi.
function mergeSchede(local, remote) {
  const merged = JSON.parse(JSON.stringify(local));

  // Campi stringa semplici: prendi il valore non-vuoto più recente
  const stringFields = ['ord','commessa','impianto','tag','valvola','dn','classe','tipologia',
                        'clientName','note','footerData','footerTimbro'];
  stringFields.forEach(f => {
    const lv = (local[f]||'').trim();
    const rv = (remote[f]||'').trim();
    // Se locale è vuoto ma remoto ha un valore, prendi remoto
    if(!lv && rv) merged[f] = rv;
    // Se entrambi hanno valore e sono diversi, tieni locale (chi salva per ultimo vince su quel campo)
  });

  // Note: concatena se entrambi hanno scritto cose diverse
  if(local.note && remote.note && local.note !== remote.note) {
    // Se il mio testo non contiene già quello remoto e viceversa, concatena
    if(!local.note.includes(remote.note) && !remote.note.includes(local.note)) {
      merged.note = local.note + '\n---\n' + remote.note;
    }
  }

  // Operazioni: merge per testo — unisce checkbox di entrambi
  if(Array.isArray(remote.ops) && Array.isArray(local.ops)) {
    const mergedOps = JSON.parse(JSON.stringify(local.ops));
    // Per ogni op remota, se esiste nel locale con stesso testo, fai OR dei checked
    // Se non esiste nel locale, aggiungila
    (remote.ops||[]).forEach(rop => {
      const idx = mergedOps.findIndex(o => o.text === rop.text);
      if(idx >= 0) {
        // OR: se uno dei due l'ha spuntata, resta spuntata
        if(rop.checked) mergedOps[idx].checked = true;
      } else {
        // Operazione aggiunta dall'altro operatore
        mergedOps.push(JSON.parse(JSON.stringify(rop)));
      }
    });
    merged.ops = mergedOps;
  }

  // Tenute: merge per nome — prendi valori non-vuoti dall'altro
  if(Array.isArray(remote.tenute) && Array.isArray(local.tenute)) {
    const mergedTenute = JSON.parse(JSON.stringify(local.tenute));
    (remote.tenute||[]).forEach(rt => {
      const idx = mergedTenute.findIndex(t => t.nome === rt.nome);
      if(idx >= 0) {
        // Per ogni campo della tenuta, se il mio è vuoto e il remoto no, prendi remoto
        ['materiale','dimensioni','n'].forEach(k => {
          if(!(mergedTenute[idx][k]||'').trim() && (rt[k]||'').trim()) {
            mergedTenute[idx][k] = rt[k];
          }
        });
      } else if(rt.nome) {
        mergedTenute.push(JSON.parse(JSON.stringify(rt)));
      }
    });
    merged.tenute = mergedTenute;
  }

  // Foto: merge additivo — aggiungi foto remote che non esistono in locale
  if(Array.isArray(remote.photos) && Array.isArray(local.photos)) {
    const localUrls = new Set(local.photos.map(p => (p.dataUrl||'').substring(0, 100)));
    (remote.photos||[]).forEach(rp => {
      const key = (rp.dataUrl||'').substring(0, 100);
      if(!localUrls.has(key)) {
        merged.photos.push(JSON.parse(JSON.stringify(rp)));
      }
    });
  }

  // Status completata: se uno dei due l'ha segnata completa, resta completa
  if(remote.completed && !local.completed) {
    merged.completed = true;
    merged.completedAt = remote.completedAt;
    merged.completedBy = remote.completedBy;
  }

  return merged;
}

// ── REAL-TIME SYNC via Firebase SSE ─────────────────────────────────
// Firebase Realtime Database supporta SSE nativo: aggiunta .json?format=export&auth=...
// Usiamo EventSource sul nodo /meta per ricevere aggiornamenti istantanei
let _sseSource = null;
let _sseFirstDumpDone = false;
let _mySaveIds = new Set();

function startRealtimeSync() {
  // Chiudi eventuale connessione precedente
  if(_sseSource) { _sseSource.close(); _sseSource = null; }

  const sseUrl = FB_BASE + '/meta.json?format=export&Accept=text/event-stream';

  try {
    _sseSource = new EventSource(sseUrl);

    _sseSource.addEventListener('put', function(e) {
      try {
        const payload = JSON.parse(e.data);
        const path = payload.path;
        const data = payload.data;

        if(path === '/') {
          // Dump completo di /meta
          let newList = [];
          if(data && typeof data === 'object') {
            newList = Object.values(data)
              .filter(Boolean)
              .sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
          }

          // Dopo il primo dump, confronta e notifica
          if(_sseFirstDumpDone) {
            const oldIds = new Set(cloudSchedeList.map(s=>s.id));
            const oldCompleted = {};
            cloudSchedeList.forEach(s=>{ if(s) oldCompleted[s.id]=!!s.completed; });

            newList.forEach(s=>{
              if(!s || !s.id || _mySaveIds.has(s.id)) return;
              if(!oldIds.has(s.id)){
                // NUOVA SCHEDA
                showNotification('📋 ' + (s._savedBy||'Qualcuno') + ' ha creato: ' + (s.clientName||'') + (s.valvola?' — '+s.valvola:''), '#2980b9');
              } else if(s.completed && !oldCompleted[s.id]){
                // COMPLETATA
                showNotification('✅ ' + (s.completedBy||s._savedBy||'Qualcuno') + ' ha completato: ' + (s.clientName||'') + (s.valvola?' — '+s.valvola:''), '#27ae60');
              }
            });

            // ELIMINAZIONI
            const newIds = new Set(newList.map(s=>s.id));
            cloudSchedeList.forEach(old=>{
              if(old && old.id && !newIds.has(old.id) && !_mySaveIds.has(old.id)){
                showNotification('🗑️ ' + (old._savedBy||'Qualcuno') + ' ha eliminato: ' + (old.clientName||'') + (old.valvola?' — '+old.valvola:''), '#e74c3c');
              }
            });
          }
          _sseFirstDumpDone = true;
          cloudSchedeList = newList;

        } else {
          // Aggiornamento singola scheda — path = '/{id}'
          const id = path.replace(/^\//, '');
          if(data === null) {
            // ELIMINATA
            const old = cloudSchedeList.find(x => x.id === id);
            cloudSchedeList = cloudSchedeList.filter(x => x.id !== id);
            if(old && !_mySaveIds.has(id)) {
              showNotification('🗑️ ' + (old._savedBy||'Qualcuno') + ' ha eliminato: ' + (old.clientName||'') + ' — ' + (old.valvola||''), '#e74c3c');
            }
          } else if(data && data.id) {
            const idx = cloudSchedeList.findIndex(x => x.id === id);
            const isNew = idx < 0;
            const wasCompleted = idx >= 0 && cloudSchedeList[idx].completed;
            if(idx >= 0) {
              cloudSchedeList[idx] = data;
            } else {
              cloudSchedeList.push(data);
            }
            cloudSchedeList.sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));

            // Notifica solo CREA e COMPLETA (non aggiornamenti generici)
            if(!_mySaveIds.has(id)) {
              const who = data._savedBy || 'Qualcuno';
              const desc = (data.clientName||'') + (data.valvola ? ' — ' + data.valvola : '') + (data.tag ? ' | TAG ' + data.tag : '');
              if(data.completed && !wasCompleted) {
                showNotification('✅ ' + who + ' ha completato: ' + desc, '#27ae60');
              } else if(isNew) {
                showNotification('📋 ' + who + ' ha creato: ' + desc, '#2980b9');
              }
              // Nessuna notifica per aggiornamenti normali
            }
          }
        }

        renderCloudList();
        const n = cloudSchedeList.length;
        setDot('green', '☁️ Live — ' + n + (n===1?' scheda':' schede'));
        const syncEl = document.getElementById('cloud-last-sync');
        if(syncEl) syncEl.textContent = new Date().toLocaleTimeString('it');
      } catch(err) { console.warn('SSE parse error', err); }
    });

    _sseSource.addEventListener('patch', function(e) {
      // patch = aggiornamento parziale → ri-sincronizza tutto
      syncFromCloud();
    });

    _sseSource.onerror = function() {
      setDot('yellow', '⚡ Riconnessione...');
      // EventSource si riconnette automaticamente — nessuna azione necessaria
    };

    _sseSource.onopen = function() {
      setDot('green', '☁️ Live');
    };

  } catch(e) {
    console.warn('SSE non supportato, uso polling', e);
    // Fallback: polling ogni 15s
    setInterval(() => {
      if(document.getElementById('home-screen').style.display !== 'none') {
        syncFromCloud();
      }
    }, 15000);
  }
}

// Polling di backup ogni 60s (nel caso SSE perda eventi)

// =================== PWA SERVICE WORKER ===================
// Nota: Safari iOS non supporta Service Worker con blob: URL.
// La PWA funziona tramite i meta tag apple-mobile-web-app-capable.
// Il SW viene registrato solo su Chrome/Android/Desktop.
if('serviceWorker' in navigator && !/iPhone|iPad|iPod/.test(navigator.userAgent)){
  const swCode=`
const CACHE='tms-v4';
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./'])).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));
});`;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }catch(e){}
}
