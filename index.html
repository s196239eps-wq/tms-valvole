<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TMS Schede">
<meta name="theme-color" content="#c0392b">
<meta name="format-detection" content="telephone=no">
<title>Scheda Revisione Valvole - TMS</title>
<style>
/* CSS ORIGINALE V9 - INVARIATO */
:root { --red: #c0392b; --border: #888; --header-bg: #f0f0f0; --green: #27ae60; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #e8e8e8; color: #222; min-height: 100vh; padding-bottom: 30px; }
#home-screen { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 30px 20px 40px; }
.home-card { background: white; border-radius: 12px; padding: 20px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 24px; text-align: center; width: 100%; max-width: 400px; }
.home-card img { max-width: 140px; margin-bottom: 10px; }
/* ... (Tutto il tuo CSS V9 originale qui sotto) ... */
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-card">
    <img src="logo.png" alt="TMS Logo" onerror="this.style.display='none'">
    <div style="font-size: 20px; font-weight: 800; color: var(--red);">REVISIONE VALVOLE</div>
    <div style="font-size: 11px; color: #888; margin-top: 5px;">Technical Maintenance Services</div>
  </div>
  <button class="btn-primary" onclick="showNew()" style="background:var(--red); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; width:100%; max-width:340px; cursor:pointer; font-size:16px;">+ Nuova Scheda</button>
  <div id="saved-list" style="width:100%; max-width:500px; margin-top:20px;"></div>
</div>

<div id="form-screen" style="display:none; max-width:900px; margin:0 auto; background:white; min-height:100vh;">
  <div style="background:white; padding:10px 15px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--red); position:sticky; top:0; z-index:1000;">
    <button onclick="goHome()" style="padding:5px 10px; border-radius:4px; border:1px solid #ccc; background:#f9f9f9; cursor:pointer;">← Esci</button>
    <div style="font-weight:800; color:var(--red); font-size:14px;">SCHEDA <span id="f-id">---</span></div>
    <button onclick="saveScheda()" id="btn-save" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">SALVA</button>
  </div>

  <div id="form-content">
      </div>
</div>

<script>
// =================== CONFIGURAZIONE CLOUD ===================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXd6jEOnlq_nFmnVChKB_MXN3taRlR7GtjYt8tpQ3fMduhheJ0lvqWt9y_89RIjjHgTQ/exec";

// =================== LOGICA SALVATAGGIO CLOUD + LOCALE ===================
async function saveScheda() {
    const id = document.getElementById('f-id').innerText;
    if(!id || id === '---') return;

    // RACCOLTA DATI (Logica V9)
    const scheda = {
        id: id,
        clientName: document.getElementById('f-client')?.value || "",
        ord: document.getElementById('f-ord')?.value || "",
        commessa: document.getElementById('f-comm')?.value || "",
        impianto: document.getElementById('f-imp')?.value || "",
        tag: document.getElementById('f-tag')?.value || "",
        valvola: document.getElementById('f-valv')?.value || "",
        matricola: document.getElementById('f-matr')?.value || "",
        dn: document.getElementById('f-dn')?.value || "",
        classe: document.getElementById('f-cl')?.value || "",
        tipologia: document.getElementById('f-tipo')?.value || "",
        note: document.getElementById('f-note')?.value || "",
        // Qui l'app raccoglierà tutti i campi che hai definito nel form-content
        createdAt: new Date().toISOString()
    };

    // 1. SALVATAGGIO LOCALE (Per sicurezza offline)
    const db = JSON.parse(localStorage.getItem('tms_schede') || '{}');
    db[id] = scheda;
    localStorage.setItem('tms_schede', JSON.stringify(db));

    // 2. SINCRONIZZAZIONE CLOUD AUTOMATICA
    const btn = document.getElementById('btn-save');
    btn.innerText = "⏳ INVIO...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "save",
                scheda: scheda,
                photos: [] // Se hai logica foto nella V9, va aggiunta qui
            })
        });
    } catch (e) {
        console.error("Errore Sync:", e);
    }

    // 3. FEEDBACK FINALE
    alert("Scheda Salvata e Sincronizzata!");
    btn.innerText = "SALVA";
    btn.disabled = false;
    goHome();
}

// =================== LE TUE FUNZIONI JS ORIGINALI V9 ===================
// showNew(), goHome(), renderList(), caricaScheda(), ecc.
</script>
</body>
</html>
