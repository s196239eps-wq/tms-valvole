<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TMS Cloud - Revisioni</title>
<style>
    :root { --red: #c0392b; --green: #27ae60; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #e8e8e8; margin: 0; padding: 0; }
    
    /* Home */
    #home-screen { display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .home-card { background: white; border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .logo-img { max-width: 120px; height: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
    
    /* Pulsanti */
    .btn-main { background: var(--red); color: white; border: none; border-radius: 10px; padding: 18px; width: 100%; max-width: 400px; font-size: 16px; font-weight: bold; cursor: pointer; }
    
    /* Form */
    #form-screen { display: none; background: white; min-height: 100vh; }
    .top-bar { background: white; padding: 10px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    
    /* Tabelle */
    .section-header { background: #444; color: white; padding: 8px 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .dati-row { display: flex; border-bottom: 1px solid #eee; }
    .dati-label { width: 120px; background: #f9f9f9; padding: 10px; font-size: 11px; font-weight: bold; color: #666; border-right: 1px solid #eee; }
    .dati-input { flex: 1; border: none; padding: 10px; font-size: 14px; outline: none; width: 100%; }

    /* Lista Home */
    .saved-list { width: 100%; max-width: 400px; margin-top: 20px; }
    .scheda-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--red); }
</style>
</head>
<body>

<div id="home-screen">
    <div class="home-card">
        <img src="logo.png" class="logo-img" alt="TMS" onerror="this.style.display='none'">
        <div style="font-size: 18px; font-weight: 800; color: var(--red);">REVISIONE VALVOLE</div>
    </div>
    
    <button class="btn-main" onclick="apriNuova()">+ NUOVA SCHEDA</button>

    <div class="saved-list" id="lista-schede">
        </div>
</div>

<div id="form-screen">
    <div class="top-bar">
        <button onclick="chiudiForm()" style="border:none; background:none; font-size:16px;">✕</button>
        <b id="titolo-id">NUOVA SCHEDA</b>
        <button onclick="salvaTutto()" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">SALVA</button>
    </div>

    <div class="section-header">Identificazione</div>
    <div class="dati-row"><div class="dati-label">CLIENTE</div><input type="text" id="in-cliente" class="dati-input"></div>
    <div class="dati-row"><div class="dati-label">TAG / POS.</div><input type="text" id="in-tag" class="dati-input"></div>
    <div class="dati-row"><div class="dati-label">MATRICOLA</div><input type="text" id="in-matr" class="dati-input"></div>
    
    <div class="section-header">Note</div>
    <textarea id="in-note" style="width:100%; height:150px; border:none; padding:15px; font-family:inherit; font-size:14px;" placeholder="Dettagli intervento..."></textarea>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXd6jEOnlq_nFmnVChKB_MXN3taRlR7GtjYt8tpQ3fMduhheJ0lvqWt9y_89RIjjHgTQ/exec";

function apriNuova() {
    const nuovoId = "TMS-" + Date.now();
    document.getElementById('titolo-id').innerText = nuovoId;
    // Pulisce i campi
    document.getElementById('in-cliente').value = "";
    document.getElementById('in-tag').value = "";
    document.getElementById('in-matr').value = "";
    document.getElementById('in-note').value = "";
    
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('form-screen').style.display = 'block';
    window.scrollTo(0,0);
}

function chiudiForm() {
    if(confirm("Tornare alla home? I dati non salvati andranno persi.")) {
        document.getElementById('home-screen').style.display = 'flex';
        document.getElementById('form-screen').style.display = 'none';
        caricaLista();
    }
}

async function salvaTutto() {
    const id = document.getElementById('titolo-id').innerText;
    const scheda = {
        id: id,
        clientName: document.getElementById('in-cliente').value,
        tag: document.getElementById('in-tag').value,
        matricola: document.getElementById('in-matr').value,
        note: document.getElementById('in-note').value,
        data: new Date().toLocaleString()
    };

    if(!scheda.clientName) { alert("Inserisci il cliente!"); return; }

    // Salva Localmente (Per velocità)
    let locali = JSON.parse(localStorage.getItem('tms_cache') || '{}');
    locali[id] = scheda;
    localStorage.setItem('tms_cache', JSON.stringify(locali));

    // Salva su Google (Background)
    try {
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "save", scheda: scheda })
        });
    } catch(e) { console.log("Errore sync cloud"); }

    alert("Scheda Salvata correttamente!");
    document.getElementById('home-screen').style.display = 'flex';
    document.getElementById('form-screen').style.display = 'none';
    caricaLista();
}

function caricaLista() {
    const lista = document.getElementById('lista-schede');
    const dati = JSON.parse(localStorage.getItem('tms_cache') || '{}');
    lista.innerHTML = "";
    
    Object.values(dati).reverse().forEach(s => {
        const item = document.createElement('div');
        item.className = 'scheda-item';
        item.innerHTML = `<div><b>${s.clientName}</b><br><small>${s.id}</small></div><span>➔</span>`;
        lista.appendChild(item);
    });
}

window.onload = caricaLista;
</script>
</body>
</html>
