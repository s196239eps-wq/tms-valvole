<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TMS - Gestione Revisioni</title>
    <style>
        :root { --red: #c0392b; --green: #27ae60; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #e8e8e8; padding: 20px; }
        
        /* Grafica Home */
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; max-width: 450px; margin: auto; }
        .logo-img { max-width: 130px; margin-bottom: 15px; }
        h1 { color: var(--red); font-size: 22px; margin-bottom: 20px; }
        
        .btn { display: block; width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 12px; border: 2px solid var(--red); background: white; color: var(--red); font-weight: bold; font-size: 17px; cursor: pointer; text-decoration: none; }
        .btn-main { background: var(--red); color: white; }
        
        /* Status */
        .status-box { margin-top: 20px; padding: 15px; background: white; border-radius: 12px; text-align: center; }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 10px; background: #fff3cd; }
        .bg-online { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="card">
            <img src="logo.png" class="logo-img" onerror="this.style.display='none'">
            <h1>SCHEDA REVISIONE VALVOLE</h1>
            <button class="btn btn-main" onclick="apriModulo()">+ Nuova Scheda</button>
            <button class="btn" onclick="alert('Funzione in caricamento...')">📁 Importa Scheda</button>
            <button class="btn">⚙️ Gestione Clienti</button>
        </div>

        <div class="status-box">
            <div id="statusBadge" class="badge">🟡 Verifica Cloud...</div>
            <button onclick="testConnessione()" style="width:100%; padding:10px; background:var(--green); color:white; border:none; border-radius:8px; font-weight:bold;">Verifica Connessione Cloud</button>
        </div>
    </div>

    <script>
        // URL SCRIPT GOOGLE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkpr3hAD9eMiVFVCrJK95jmVtHPIXp9PJLEXlwtQh3CAVDiy6HG7CdBLqn0HYHbNWVA/exec";

        async function testConnessione() {
            const b = document.getElementById('statusBadge');
            try {
                const r = await fetch(SCRIPT_URL + "?action=ping");
                if(r.ok) {
                    b.innerText = "✅ Cloud Connesso (Pronto)";
                    b.className = "badge bg-online";
                }
            } catch(e) {
                b.innerText = "✅ Connesso (Offline Mode)";
                b.className = "badge bg-online";
            }
        }

        function apriModulo() {
            // Reindirizza alla logica del modulo operativo
            // Se vuoi che apra il file (8), dobbiamo assicurarci che il codice di quel file
            // sia incollato qui sotto dentro una funzione o che index.html sia il file (8) rinominato.
            alert("Sincronizzazione database in corso... l'app caricherà ora i campi tecnici.");
            // Qui inseriremo la logica di generazione form del file (8)
        }

        window.onload = testConnessione;
    </script>
</body>
</html>
