<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Scheda Revisione Valvole - TMS v13</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
/* Mantengo il tuo stile originale della versione 12 */
:root { --red: #c0392b; --border: #888; --header-bg: #f0f0f0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #e8e8e8; color: #222; min-height: 100vh; }
#home-screen { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
.home-logo { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 24px; }
.btn-primary { background: var(--red); color: white; border: none; border-radius: 8px; padding: 15px; width: 100%; max-width: 340px; font-weight: 700; cursor: pointer; margin: 5px 0; }
.saved-list { width: 100%; max-width: 500px; margin-top: 16px; }
.saved-item { background: white; border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; margin: 6px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
/* ... (resto del tuo CSS originale) ... */
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-logo">
    <div class="home-title">TMS SCHEDE</div>
    <div class="home-subtitle">Revisione Valvole</div>
  </div>
  
  <button class="btn-primary" onclick="nuovaScheda()">+ NUOVA SCHEDA</button>
  
  <div class="cloud-section-title">Archivio Cloud Firebase</div>
  <div id="saved-list" class="saved-list">
    </div>
</div>

<script>
// CONFIGURAZIONE FIREBASE (Dati dai tuoi screenshot)
const firebaseConfig = {
  apiKey: "AIzaSy...", // Incolla qui la tua API Key completa se troncata
  authDomain: "tms-app-8397a.firebaseapp.com",
  databaseURL: "https://tms-app-8397a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tms-app-8397a",
  storageBucket: "tms-app-8397a.appspot.com",
  messagingSenderId: "367355556209",
  appId: "1:367355556209:web:757367683939"
};

// Inizializzazione sicura
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

// FUNZIONE DI SALVATAGGIO SU FIREBASE
async function saveScheda() {
    const id = document.getElementById('f-id').innerText;
    
    // Raccogliamo i dati dal form
    const scheda = {
        id: id,
        clientName: document.getElementById('f-client').value || "Cliente Anonimo",
        tag: document.getElementById('f-tag').value || "",
        date: new Date().toLocaleString(),
        timestamp: firebase.database.ServerValue.TIMESTAMP
        // Aggiungi qui tutti gli altri campi del tuo form
    };

    try {
        await database.ref('schede/' + id).set(scheda);
        alert("✅ Salvato con successo nel Cloud!");
        location.reload(); // Torna alla home e rinfresca
    } catch (error) {
        alert("❌ Errore durante il salvataggio: " + error.message);
    }
}

// FUNZIONE DI SINCRONIZZAZIONE (Risolve l'errore 'length')
function syncFromCloud() {
    const container = document.getElementById('saved-list');
    
    // Ascolta i cambiamenti in tempo reale
    database.ref('schede').on('value', (snapshot) => {
        const data = snapshot.val();
        container.innerHTML = "";

        if (!data) {
            container.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>Nessuna scheda presente</p>";
            return;
        }

        // Trasformiamo l'oggetto in array per evitare errori di 'length'
        const listaSchede = Object.values(data).reverse();

        listaSchede.forEach(s => {
            const item = document.createElement('div');
            item.className = 'saved-item';
            item.innerHTML = `
                <div onclick="apriScheda('${s.id}')" style="cursor:pointer">
                    <b>${s.id}</b> - ${s.clientName}<br>
                    <small>${s.tag} | ${s.date}</small>
                </div>
                <button class="btn-sm" onclick="eliminaScheda('${s.id}')">Elimina</button>
            `;
            container.appendChild(item);
        });
    }, (error) => {
        console.error("Errore Firebase:", error);
    });
}

// Avvio automatico
document.addEventListener('DOMContentLoaded', () => {
    syncFromCloud();
});

// Funzione placeholder per aprire la scheda (usa la tua logica originale)
function apriScheda(id) {
    // Inserisci qui la logica per mostrare il form con i dati caricati
    console.log("Apertura scheda:", id);
}
</script>
</body>
</html>
