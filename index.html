<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TMS Schede">
<meta name="theme-color" content="#c0392b">
<title>Scheda Revisione Valvole - TMS</title>
<style>
/* TUTTO IL TUO CSS ORIGINALE V8 - NERO E ROSSO */
:root { --red: #c0392b; --border: #888; --header-bg: #f0f0f0; --green: #27ae60; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #e8e8e8; color: #222; }
#home-screen { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
.home-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 400px; margin-bottom: 20px; }
/* ... resto del tuo CSS originale ... */
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-card">
    <img src="logo.png" alt="TMS Logo" style="max-width: 140px; margin-bottom: 15px;" onerror="this.style.display='none'">
    <div style="font-size: 20px; font-weight: 800; color: var(--red);">REVISIONE VALVOLE</div>
  </div>
  <button class="btn-primary" style="width:100%; max-width:340px; padding:15px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="showNew()">+ Nuova Scheda</button>
  <div id="saved-list" style="width:100%; max-width:500px; margin-top:20px;"></div>
</div>

<div id="form-screen" style="display:none; background:white;">
  <div style="padding: 10px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background:white;">
    <button onclick="goHome()">← Esci</button>
    <b style="color:var(--red);">SCHEDA <span id="f-id">---</span></b>
    <button onclick="saveScheda()" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold;">SALVA</button>
  </div>
  </div>

<script>
// LINK GOOGLE APPS SCRIPT
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXd6jEOnlq_nFmnVChKB_MXN3taRlR7GtjYt8tpQ3fMduhheJ0lvqWt9y_89RIjjHgTQ/exec";

// ===========================================================
// FUNZIONE SAVE ORIGINALE (FOTO 3) CON AGGIUNTA SYNC
// ===========================================================
function saveScheda() {
  const id = document.getElementById('f-id').innerText;
  if(!id || id==='---') return;

  const scheda = {
    id: id,
    clientName: document.getElementById('f-client').value,
    ord: document.getElementById('f-ord').value,
    commessa: document.getElementById('f-comm').value,
    impianto: document.getElementById('f-imp').value,
    tag: document.getElementById('f-tag').value,
    valvola: document.getElementById('f-valv').value,
    matricola: document.getElementById('f-matr').value,
    dn: document.getElementById('f-dn').value,
    classe: document.getElementById('f-cl').value,
    tipologia: document.getElementById('f-tipo').value,
    note: document.getElementById('f-note').value,
    createdAt: new Date().toISOString(),
    // ... aggiungi qui tutti gli altri campi della tua tabella V8
  };

  // Salvataggio locale (Foto 3)
  const db = JSON.parse(localStorage.getItem('tms_schede')||'{}');
  db[id] = scheda;
  localStorage.setItem('tms_schede', JSON.stringify(db));

  // PARTE AUTOMATICA: Invia al cloud subito dopo il salvataggio locale
  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ action: "save", scheda: scheda, photos: scheda.photos || [] })
  }).then(() => {
    console.log("Sincronizzato con Google");
  }).catch(err => console.log("Errore sync:", err));

  alert("Scheda Salvata e Sincronizzata!"); // Messaggio come in Foto 3
  goHome();
}

// ===========================================================
// TUTTE LE TUE FUNZIONI ORIGINALI V8 (INVIARIATE)
// ===========================================================
function showNew() { /* tua funzione originale */ }
function goHome() { /* tua funzione originale */ }
// ... eccetera
</script>
</body>
</html>
