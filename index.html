<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TMS Schede">
<meta name="theme-color" content="#c0392b">
<title>Scheda Revisione Valvole - TMS</title>
<style>
/* CSS ORIGINALE V8 INVARIATO */
:root { --red: #c0392b; --border: #888; --header-bg: #f0f0f0; --green: #27ae60; }
/* ... (tutto il tuo CSS qui) ... */
#home-screen { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; }
.home-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 400px; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="home-screen">
    <div class="home-card">
        <img src="logo.png" alt="TMS Logo" style="max-width: 140px; margin-bottom: 15px;">
        <div style="font-size: 20px; font-weight: 800; color: var(--red);">REVISIONE VALVOLE</div>
    </div>
    <button onclick="showNew()" style="width:100%; max-width:340px; padding:15px; background:var(--red); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">+ Nuova Scheda</button>
    <div id="saved-list"></div>
</div>

<div id="form-screen" style="display:none;">
    <div style="padding: 10px; background: #fff; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
        <button onclick="goHome()">← Esci</button>
        <b style="color:var(--red);">SCHEDA <span id="f-id">---</span></b>
        <button onclick="saveScheda()" id="btn-main-save" style="background:var(--green); color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold;">SALVA</button>
    </div>

    </div>

<script>
// CONFIGURAZIONE CLOUD
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXd6jEOnlq_nFmnVChKB_MXN3taRlR7GtjYt8tpQ3fMduhheJ0lvqWt9y_89RIjjHgTQ/exec";

// ===========================================================
// MODIFICA ALLA TUA FUNZIONE ORIGINALE SAVE PER SYNC AUTOMATICO
// ===========================================================
async function saveScheda() {
    // 1. Esegue prima il tuo salvataggio locale originale
    const id = document.getElementById('f-id').innerText;
    if(!id || id === '---') return;

    // (Logica semplificata del tuo salvataggio V8 per l'esempio)
    const scheda = {
        id: id,
        clientName: document.getElementById('f-client')?.value || "",
        tag: document.getElementById('f-tag')?.value || "",
        // ... (tutti gli altri campi della tua V8)
        createdAt: new Date().toISOString()
    };

    // Salvataggio nel LocalStorage (come facevi prima)
    const localData = JSON.parse(localStorage.getItem('tms_schede') || '{}');
    localData[id] = scheda;
    localStorage.setItem('tms_schede', JSON.stringify(localData));

    // 2. AVVIA AUTOMATICAMENTE LA SINCRONIZZAZIONE CLOUD
    const btn = document.getElementById('btn-main-save');
    btn.innerText = "⏳ SYNC...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "save",
                scheda: scheda,
                photos: scheda.photos || []
            })
        });
        console.log("Sincronizzazione Cloud completata");
    } catch (e) {
        console.error("Errore Sync:", e);
    } finally {
        btn.innerText = "SALVA";
        btn.disabled = false;
        alert("Scheda salvata e sincronizzata!");
        goHome();
    }
}

// ===========================================================
// INCOLLA QUI SOTTO TUTTO IL RESTO DEL TUO CODICE V8 ORIGINALE
// (showNew, goHome, renderList, addPhoto, ecc.)
// ===========================================================

</script>
</body>
</html>
