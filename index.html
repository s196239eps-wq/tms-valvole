<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Scheda Revisione Valvole - TMS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
/* QUI INCOLLA TUTTO IL TUO CSS ORIGINALE DELLA VERSIONE 12 (NON CAMBIO NULLA) */
:root { --red: #c0392b; --border: #888; --header-bg: #f0f0f0; --green: #27ae60; }
/* ... (tutto il tuo stile rimane qui) ... */
</style>
</head>
<body>

<div id="home-screen">
  </div>

<div id="form-screen" style="display:none;">
  </div>

<script>
// 1. CONFIGURAZIONE FIREBASE (Dalle tue immagini)
const firebaseConfig = {
  apiKey: "AIzaSyD-L0V3P8_...", // Usa la tua chiave completa
  authDomain: "tms-app-8397a.firebaseapp.com",
  databaseURL: "https://tms-app-8397a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tms-app-8397a",
  storageBucket: "tms-app-8397a.appspot.com",
  messagingSenderId: "367355556209",
  appId: "1:367355556209:web:757367683939"
};

// Inizializzazione
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const database = firebase.database();

// 2. FUNZIONE SALVA (MODIFICATA PER FIREBASE)
async function saveScheda() {
  const id = document.getElementById('f-id').innerText;
  if(!id || id === '---') return;

  // Raccogli i dati esattamente come facevi prima
  const scheda = {
    id: id,
    clientName: document.getElementById('f-client').value || "",
    // ... tutti i tuoi campi f-tag, f-valv, ecc. ...
    createdAt: new Date().toISOString()
  };

  const btn = document.getElementById('btn-save');
  btn.innerText = "⏳ INVIO...";
  btn.disabled = true;

  try {
    // Salvataggio su Firebase (Sostituisce GAS)
    await database.ref('schede/' + id).set(scheda);
    
    // Mantieni anche il salvataggio locale per la PWA
    const db = JSON.parse(localStorage.getItem('tms_schede') || '{}');
    db[id] = scheda;
    localStorage.setItem('tms_schede', JSON.stringify(db));

    alert("Scheda Salvata e Sincronizzata!");
    goHome();
  } catch (e) {
    alert("Errore salvataggio Cloud: " + e.message);
  } finally {
    btn.innerText = "SALVA";
    btn.disabled = false;
  }
}

// 3. FUNZIONE SINCRONIZZAZIONE (RISOLVE L'ERRORE LENGTH)
async function syncFromCloud() {
  database.ref('schede').once('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) return; // Se il database è vuoto, non fare nulla (evita l'errore)

    const db = JSON.parse(localStorage.getItem('tms_schede') || '{}');
    
    // Trasformiamo l'oggetto Firebase in lista in modo sicuro
    Object.values(data).forEach(s => {
      db[s.id] = s;
    });

    localStorage.setItem('tms_schede', JSON.stringify(db));
    renderList();
  });
}

// 4. RENDERING LISTA (SICURO)
function renderList() {
  const container = document.getElementById('saved-list');
  if(!container) return;
  container.innerHTML = "";

  const db = JSON.parse(localStorage.getItem('tms_schede') || '{}');
  const schede = Object.values(db);

  if (schede.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">Nessuna scheda</div>';
    return;
  }

  // Ordina e mostra (Usa il tuo codice grafico originale qui)
  schede.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(s => {
    const div = document.createElement('div');
    div.className = 'saved-item';
    div.innerHTML = `<div><b>${s.clientName}</b><br><small>${s.id}</small></div>`;
    div.onclick = () => caricaScheda(s.id);
    container.appendChild(div);
  });
}

// MANTENGO TUTTE LE TUE FUNZIONI ORIGINALI (caricaScheda, nuovaScheda, PWA Service Worker, ecc.)
// ...
</script>
</body>
</html>
